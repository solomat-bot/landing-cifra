  <text x="218" y="394" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#FFFFFF" text-anchor="middle">Бесплатная консультация</text>

  <!-- Bottom stripe -->
  <rect x="0" y="580" width="1200" height="50" fill="#1C1E26" opacity="0.03"/>
  <text x="90" y="612" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="15" fill="#5D5F6E">cifra.ru</text>
  <text x="1140" y="612" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="15" fill="#5D5F6E" text-anchor="end">Прозрачно · Фиксированные цены · 14 дней правок</text>
