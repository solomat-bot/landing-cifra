  <rect x="1108" y="140" width="14" height="200" rx="3" fill="#3A5A6E" opacity="0.2"/>

  <!-- Line graph -->
  <path d="M910 350 L950 310 L990 330 L1030 270 L1070 250 L1110 220" stroke="#C4604A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <circle cx="950" cy="310" r="4" fill="#C4604A" opacity="0.2"/>
  <circle cx="1030" cy="270" r="5" fill="#C4604A" opacity="0.3"/>
  <circle cx="1070" cy="250" r="4" fill="#C4604A" opacity="0.2"/>

  <!-- Decorative dots bottom left -->
  <circle cx="60" cy="540" r="3" fill="#C4604A" opacity="0.06"/>
  <circle cx="76" cy="540" r="3" fill="#C4604A" opacity="0.06"/>
  <circle cx="92" cy="540" r="3" fill="#C4604A" opacity="0.06"/>
  <circle cx="60" cy="556" r="3" fill="#C4604A" opacity="0.06"/>
  <circle cx="76" cy="556" r="3" fill="#C4604A" opacity="0.06"/>
  <circle cx="92" cy="556" r="3" fill="#C4604A" opacity="0.06"/>

