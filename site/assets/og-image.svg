  </defs>

  <!-- Subtle decorative circles -->
  <circle cx="1050" cy="100" r="200" stroke="#C4604A" stroke-width="0.5" fill="none" opacity="0.08"/>
  <circle cx="1050" cy="100" r="150" stroke="#C4604A" stroke-width="0.5" fill="none" opacity="0.06"/>
  <circle cx="1050" cy="100" r="100" stroke="#C4604A" stroke-width="0.5" fill="none" opacity="0.04"/>

  <!-- Chart bars decorative -->
  <rect x="920" y="260" width="16" height="80" rx="4" fill="#C4604A" opacity="0.12"/>
  <rect x="948" y="230" width="16" height="110" rx="4" fill="#C4604A" opacity="0.2"/>
  <rect x="976" y="210" width="16" height="130" rx="4" fill="#C4604A" opacity="0.3"/>
  <rect x="1004" y="170" width="16" height="170" rx="4" fill="#C4604A" opacity="0.45"/>
